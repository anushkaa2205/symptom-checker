<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Insights & Blogs - Symptom Checker</title>
    <meta name="description" content="Read trending health news and in-depth articles on diabetes, heart disease, mental health, nutrition, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/blogs-premium.css">
    <link rel="stylesheet" href="/css/global.css">
</head>
    <!-- Background Ambient Effects -->
    <div class="ambient-bg"></div>

    <!-- Navigation Header -->
    <div id="navbar"></div>

    <main class="blogs-container">
        <!-- Hero Section: Editorial Style -->
        <header class="blog-hero reveal">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Health Resources & Insights</h1>
                    <p>Trusted articles, medical awareness guides, and wellness resources curated for you.</p>
                    
                    <div class="category-pills">
                        <button class="pill active" data-category="all">All</button>
                        <button class="pill" data-category="Heart Health">Heart Health</button>
                        <button class="pill" data-category="Mental Health">Mental Health</button>
                        <button class="pill" data-category="Nutrition">Nutrition</button>
                        <button class="pill" data-category="Immunity">Immunity</button>
                        <button class="pill" data-category="Emergency Care">Emergency Care</button>
                        <button class="pill" data-category="Wellness">Wellness</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Recommended For You Section -->
        <section class="recommended-section reveal" id="recommended-section" style="display: none;">
            <div class="section-header">
                <h2 class="section-title">Recommended For You</h2>
                <p class="section-subtitle">Based on your recent health activity</p>
            </div>
            <div class="recommended-grid" id="recommended-grid">
                <!-- JS injects personalized cards here -->
            </div>
        </section>

        <!-- Trending News Section: Horizontal Carousel -->
        <section class="trending-section reveal">
            <div class="section-header">
                <h2 class="section-title">Trending Medical News</h2>
                <div class="carousel-controls">
                    <button id="prev-news" class="btn-icon" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                    <button id="next-news" class="btn-icon" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                </div>
            </div>
            <div class="trending-carousel" id="trending-carousel">
                <div class="trending-track" id="trending-track">
                    <!-- JS injects compact trending cards here -->
                </div>
            </div>
        </section>

        <!-- Featured Articles Grid -->
        <section class="articles-section reveal">
            <h2 class="section-title">Featured Articles</h2>
            <div class="article-grid" id="article-grid">
                <!-- Static Articles (Content from JS articleData) -->
            </div>
        </section>
    </main>

    <!-- Article Modal Overlay -->
    <div class="article-modal-overlay" id="article-modal-overlay">
        <div class="article-modal" id="article-modal">
            <button class="modal-close-btn" id="modal-close-btn" aria-label="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <img class="modal-hero-img" id="modal-hero-img" src="" alt="">
            <div class="modal-body">
                <span class="article-category" id="modal-category"></span>
                <h1 id="modal-title"></h1>
                <div class="modal-meta" id="modal-meta"></div>
                <div class="modal-content" id="modal-content"></div>
            </div>
        </div>
    </div>

    <script src="/js/navbar.js"></script>
    <script src="/js/blogs.js"></script>
</body>
</html>
