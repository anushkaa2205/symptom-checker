<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>
    <header>
        <nav>
            <p>Symptom Checker</p>
            <ul class="nav-list">
                <li><a href="/blogs">Blogs</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/about">About us</a></li>
                <li><a href="/login">Log In</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat">+ New Assessment</button>
            <div class="recent">Recent Assessments</div>
            <ul class="recent-chats">
                <li> <img height="15px" width = "15px" src = "/assets/play-button-arrowhead.png"> Fever & Cough</li>
                <li> <img height="15px" width = "15px" src = "/assets/play-button-arrowhead.png"> Headache issues</li>
                <li> <img height="15px" width = "15px" src = "/assets/play-button-arrowhead.png"> Stomach pain</li>
                <li> <img height="15px" width = "15px" src = "/assets/play-button-arrowhead.png"> Cold Symptoms</li>
            </ul>
        </div>
        <div class="main">
            <div class="chat-header">
                <div class="header-info">
                    <h2>Clinical Triaging Assistant</h2>
                    <span class="status-indicator"></span> <span class="status-text">Online</span>
                </div>
            </div>
            
            <div class="chat-container" id="chat-container">
                <div class="message bot-message">
                    <div class="avatar bot-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <div class="message-content">
                        Hello! I am your AI Symptom Checker. How can I assist you today? Please describe your symptoms in detail.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Type your symptoms here..." autocomplete="off">
                    <button id="send-btn" class="send-btn" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/chat.js"></script>
</body>
</html>
