<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/chat-premium.css">
</head>
<body>
    <header>
        <nav>
            <p>Symptom Checker</p>
            <ul class="nav-list">
                <li><a href="/dashboard">Dashboard</a></li>
                <li id="auth-nav-item"><a href="/login">Log In</a></li>
                <li>
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat">+ New Assessment</button>
            <div class="recent">Recent Assessments</div>
            <ul class="recent-chats" id="recent-chats-list">
                <!-- Dynamically loaded history -->
            </ul>
        </div>
        <div class="main">
            <div class="chat-container" id="chat-container">
                <div class="empty-state" id="empty-state">
                    <h2 id="greeting-text">Hello</h2>
                    <p>How can I help you today?</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Type your symptoms here..." autocomplete="off">
                    <button id="send-btn" class="send-btn" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
