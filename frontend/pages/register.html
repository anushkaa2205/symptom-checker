<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/js/register.js"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <main class="main">
        <div class="card">
            <h1>Create an Account</h1>
            <p>Get started with an account on <a href="#" style="text-decoration: none;">SymptomChecker</a></p>
        <div class="main-content">
            <button class="google-btn"><img src="/assets/google.png" height="20px" width="20px" alt="Google" class="google"> Sign up with Google</button>
            <div class="divider">
                <span>or</span>
            </div>
            <form action="/register" method="post" class="form">
                <div class="name-fields">
                    <input type="text" id="Fname" name="Fname" required placeholder="First Name:">
                    <input type="text" id="Lname" name="Lname" required placeholder="Last Name:">
                </div>
                <div class="info-field">
                    <input type="email" id="email" name="email" required placeholder="Email:">
                    <input type="password" id="password" name="password" required placeholder="Password:">
                    <div class="confirm-group">
                    <input type="password" id="confirmPassword" name="confirmPassword"
                    placeholder="Confirm Password:" onkeyup="checkPassword()" required>
                    <span id="mess"></span>
                    </div>
                    <label for="check">
                    <input type="checkbox" id="check" name="check" required>
                    By registering you agree with our <a href="/terms" target="_blank">Terms & Conditions</a></label>
                </div>
                <div class="submit-btn">
                    <button type="submit" class="register-btn">Create Account</button>
                </div>
            </form>
            <p class="p">Already have an account? <a href="/login">Log In</a></p>
        </div>
        </div>
    </main>
</body>
</html>
