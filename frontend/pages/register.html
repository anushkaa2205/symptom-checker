<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Medora</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="register-container">
            <div class="visual-panel">
                <div class="panel-header">
                    <a href="/" class="panel-logo">
                        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M26 8C26 6.3 24.7 5 23 5H9C7.3 5 6 6.3 6 8V16C6 22 16 27 16 27C16 27 26 22 26 16V8Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 16H8L11 10L15 22L19 16H28" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Medora</span>
                    </a>
                    <a href="/" class="back-link">Back to website <span>→</span></a>
                </div>
                
                <div class="panel-footer">
                    <h2>AI-Powered <br>Symptom Analysis</h2>
                    <p>Get instant health insights with Medora.</p>
                </div>
            </div>

            <div class="form-panel">
                <div class="form-content">
                    <header class="form-header">
                        <h1>Create an account</h1>
                        <p>Already have an account? <a href="/login">Log in</a></p>
                    </header>

                    <form class="register-form" id="registerForm">
                        <div class="row">
                            <div class="input-group">
                                <input type="text" id="Fname" required placeholder="First Name">
                            </div>
                            <div class="input-group">
                                <input type="text" id="Lname" required placeholder="Last Name">
                            </div>
                        </div>

                        <div class="input-group">
                            <input type="email" id="email" required placeholder="Email Address">
                        </div>

                        <div class="input-group password-group">
                            <input type="password" id="password" required placeholder="Create Password">
                            <button type="button" class="toggle-password" data-target="password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>

                        <div class="input-group password-group">
                            <input type="password" id="confirmPassword" required placeholder="Confirm Password" onkeyup="checkPassword()">
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                            <span id="mess"></span>
                        </div>

                        <div class="terms-wrap">
                            <label class="custom-checkbox">
                                <input type="checkbox" id="check" required>
                                <span class="checkmark"></span>
                                I agree to the <a href="/terms">Terms & Conditions</a>
                            </label>
                        </div>

                        <button type="submit" class="submit-btn">Create account</button>

                        <div class="divider">
                            <span>Or register with</span>
                        </div>

                        <div class="social-btns">
                            <button type="button" class="social-btn google-btn full-width">
                                <img src="/assets/google.png" alt="Google">
                                Continue with Google
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
