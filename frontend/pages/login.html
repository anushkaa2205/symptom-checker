<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Medora</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="login-container">
            <!-- Left Side: Visual Panel -->
            <div class="visual-panel">
                <div class="panel-header">
                    <a href="/" class="panel-logo">✦ Medora</a>
                    <a href="/" class="back-link">Back to website <span>→</span></a>
                </div>
                
                <div class="panel-footer">
                    <h2>Welcome <br>Back</h2>
                    <p>Access your health dashboard and assessment history instantly.</p>
                </div>
            </div>

            <!-- Right Side: Form Panel -->
            <div class="form-panel">
                <div class="form-content">
                    <header class="form-header">
                        <h1>Log In</h1>
                        <p>Don't have an account? <a href="/register">Sign up</a></p>
                    </header>

                    <form class="login-form" id="loginForm" novalidate>
                        <div class="input-group">
                            <input type="email" id="email" required placeholder="Email Address">
                            <span class="error-msg" id="emailError"></span>
                        </div>

                        <div class="input-group password-group">
                            <input type="password" id="password" required placeholder="Enter password">
                            <button type="button" class="toggle-password" data-target="password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="forgot-password">
                            <a href="/forgot-password">Forgot password?</a>
                        </div>
                        <span class="error-msg" id="passwordError"></span>

                        <button type="submit" class="submit-btn">Log In</button>

                        <div class="divider">
                            <span>Or sign in with</span>
                        </div>

                        <div class="social-btns">
                            <button type="button" class="social-btn google-btn full-width">
                                <img src="/assets/google.png" alt="Google">
                                Continue with Google
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
